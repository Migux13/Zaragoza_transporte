name: Actualizar catálogo GTFS

"on":
  schedule:
    - cron: "0 6 * * 1" # todos los lunes a las 06:00 UTC
  workflow_dispatch:
    inputs:
      forzar:
        description: "Forzar actualización aunque no esté cerca de caducar"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Comprobar y actualizar catálogo
        env:
          NAP_EMAIL: ${{ secrets.NAP_EMAIL }}
          NAP_PASSWORD: ${{ secrets.NAP_PASSWORD }}
        run: |
          python tools/actualizar_gtfs.py ${{ github.event.inputs.forzar == 'true' && '--forzar' || '' }}

      - name: Comprobar si postes_bus.json ha cambiado
        id: cambios
        run: |
          if git diff --quiet -- custom_components/zaragoza_transporte/postes_bus.json; then
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
          else
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir Pull Request
        if: steps.cambios.outputs.hay_cambios == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Actualiza catálogo GTFS de paradas de bus"
          title: "Actualización automática del catálogo GTFS"
          body: |
            Catálogo de paradas de bus (`postes_bus.json`) regenerado automáticamente
            porque el anterior caducaba pronto (o se forzó manualmente con
            `workflow_dispatch`).

            Revisa el diff antes de aceptar: número de postes, nombres y líneas
            pueden haber cambiado con el nuevo GTFS. Recuerda subir la versión de
            `manifest.json` y crear la release al mergear.
          branch: actualizar-gtfs-automatico
          delete-branch: true
